preprocess:
  winsorize:
    method: mad
    n_mad: 3.0
    limits: [0.01, 0.99]
  neutralize: industry_size
  re_standardize_after_neutralize: true

evaluation:
  n_quantiles: 5
  primary_horizon: 5
  rebalance_days: 5
  weighting: equal
  one_way_cost: 0.001
  min_cross_section_count: 30
  rolling_ic_window: 252

gate:
  evaluability:
    min_coverage_pct: 0.30
    min_valid_dates: 60
    min_forward_return_samples: 1000
    fail_status: invalid

  direction_checks:
    require_direction_adjusted_rank_ic_positive: true
    require_q5_q1_spread_positive: true
    allow_top_quantile_slightly_negative: true

  structure_checks:
    require_strict_monotonic_quantiles: false
    require_top_quantile_effective: true
    reject_if_quantiles_clearly_reversed: true

  trading_checks:
    primary_path: top_quantile_long_only
    reference_path: q5_q1_long_short
    reject_if_top_return_clearly_negative: true
    reject_if_turnover_uncontrolled: true
    reject_if_drawdown_uncontrolled: true

  baselines:
    noise:
      - random_normal
      - random_uniform
      - random_by_date_shuffle
    simple_technical:
      - reversal_1d
      - reversal_3d
      - reversal_5d
      - momentum_20d
      - momentum_60d
      - volatility_20d
      - turnover_5d
      - turnover_20d
      - volume_ratio_5_20
      - amount_ratio_5_20
      - amplitude_20d
      - illiquidity_20d
    alpha101_easy_subset:
      enabled: false

  oos:
    method: time_split
    in_sample_pct: 0.75
    holdout_pct: 0.25
    use_for_parameter_tuning: false
    require_oos_rank_ic_not_reversed_for_active: true
    require_oos_q5_q1_spread_not_reversed_for_active: true
    require_oos_top_return_not_failed_for_active: true

  decision:
    default_pass_status: watch
    active_policy: conservative
    active_requires:
      - evaluability_passed
      - in_sample_direction_correct
      - oos_direction_not_reversed
      - in_sample_q5_q1_spread_positive
      - oos_q5_q1_spread_not_reversed
      - top_quantile_return_positive
      - stronger_than_most_noise_baselines
      - not_worse_than_simple_technical_baselines
      - no_single_year_concentration
      - turnover_and_drawdown_not_uncontrolled
